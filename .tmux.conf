# ── Core ────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g set-clipboard on
set -g update-environment "DISPLAY"
set -sg escape-time 0           # no lag on ESC (important in vim/editors)
set -g focus-events on

# ── Prefix: Ctrl+a (easier than Ctrl+b) ─────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Reload config ───────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Splits (intuitive) ──────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"   # new window inherits cwd

# ── Pane navigation (vim-style) ─────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ───────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Fast pane switching with Alt+arrow ──────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Fast window switching with Alt+number ───────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Sync panes (broadcast to all panes) ─────────────────────
bind S setw synchronize-panes \; display "Sync panes toggled!"

# ── Copy mode (vi) ──────────────────────────────────────────
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi V   send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi C-y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi Escape send-keys -X cancel
bind p paste-buffer

# ── Layouts for pentest workflows ───────────────────────────
# Recon layout: large top pane + two smaller bottom panes
bind R \
  split-window -v -p 30 \; \
  split-window -h \; \
  select-pane -t 1

# Shell layout: equal horizontal split
bind E split-window -h

# ── Logging / output capture ────────────────────────────────
# Save entire scrollback to file
bind P command-prompt -p "Save scrollback to:" "capture-pane -S - -E - -b temp; save-buffer -b temp %%; delete-buffer -b temp"

# Toggle logging current pane to file (requires tmux-logging or pipe-pane)
bind L pipe-pane -o "cat >> ~/tmux-logs/#{session_name}-#{window_name}-#{pane_index}.log" \; display "Logging toggled!"

# ── Named session shortcuts ─────────────────────────────────
bind N command-prompt -p "New session name:" "new-session -s '%%'"
bind K command-prompt -p "Kill session:" "kill-session -t '%%'"

# ── Status bar ──────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors (cyan/green theme)
set -g status-style                bg=colour235,fg=colour073
set -g window-status-style         bg=colour235,fg=colour244
set -g window-status-current-style bg=colour073,fg=colour235,bold
set -g pane-border-style           fg=colour238
set -g pane-active-border-style    fg=colour073
set -g message-style               bg=colour073,fg=colour235
set -g mode-style                  bg=colour073,fg=colour235

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=colour073,bold][#S]#[fg=colour244] #I:#P #[default]"

# Right: IP, user, time (no hostname)
set -g status-right-length 80
set -g status-right "#[fg=colour073]#{pane_current_path} #[fg=colour244]| #[fg=colour073]#(ip addr show tun0 2>/dev/null | awk '/inet /{print $2}' | cut -d/ -f1 | head -1 || ip addr show eth0 2>/dev/null | awk '/inet /{print $2}' | cut -d/ -f1 | head -1) #[fg=colour244]| #[fg=colour073]#(whoami) #[fg=colour244]| #[fg=colour073]%I:%M %p"

# Window list format
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
